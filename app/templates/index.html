<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Recommendation</title>
</head>
<body>
    <h1>Scholarship Recommendation System</h1>
    <form action="/recommend" method="post">
        <label>Student Index:</label>
        <input type="number" name="student_index" required><br><br>

        <label>CGPA:</label>
        <input type="text" name="cgpa" required><br><br>

        <label>Family Income:</label>
        <input type="text" name="income" required><br><br>

        <button type="submit">Get Recommendations</button>
    </form>
</body>
</html>
